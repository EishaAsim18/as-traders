<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password — A &amp; S Traders Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
    <script src="js/config.js?v=4"></script>
  </head>
  <body class="admin-body">
    <div class="admin-login-page">
      <div class="admin-login-wrap mx-auto">
        <div class="admin-login-card">
          <div class="login-label">Staff account</div>
          <h1 class="h5 fw-semibold mb-1">Choose a new password</h1>
          <p class="text-muted small mb-4">At least 8 characters with one special character (!@#$…).</p>
          <div id="resetAlert" class="alert small d-none"></div>
          <form id="resetForm">
            <input type="hidden" id="resetToken" />
            <div class="mb-3">
              <label class="form-label small fw-semibold" for="resetPassword">New password</label>
              <input type="password" class="form-control form-control-lg js-password-toggle" id="resetPassword" minlength="8" maxlength="72" required />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold" for="resetPassword2">Confirm password</label>
              <input type="password" class="form-control form-control-lg js-password-toggle" id="resetPassword2" minlength="8" maxlength="72" required />
            </div>
            <button type="submit" class="btn btn-admin-primary btn-lg w-100" id="resetBtn">Update password</button>
          </form>
          <p class="text-center text-muted small mt-4 mb-0">
            <a href="forgot-password.html">Request a new link</a>
          </p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/admin-api.js?v=4"></script>
    <script src="assets/js/password-toggle.js?v=1"></script>
    <script src="assets/js/admin-password-reset.js?v=1"></script>
  </body>
</html>
