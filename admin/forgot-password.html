<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot password — A &amp; S Traders Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/css/admin.css" rel="stylesheet" />
    <script src="js/config.js?v=4"></script>
  </head>
  <body class="admin-body">
    <div class="admin-login-page">
      <div class="admin-login-wrap mx-auto">
        <div class="admin-login-card">
          <div class="login-label">Staff account</div>
          <h1 class="h5 fw-semibold mb-1">Forgot password</h1>
          <p class="text-muted small mb-4">Enter your work email. If it matches our records, you can reset your password here.</p>
          <div id="forgotAlert" class="alert small d-none"></div>
          <div id="forgotResetLink" class="d-none mb-3"></div>
          <form id="forgotForm">
            <div class="mb-3">
              <label class="form-label small fw-semibold" for="forgotEmail">Work email</label>
              <input type="email" class="form-control form-control-lg" id="forgotEmail" required />
            </div>
            <button type="submit" class="btn btn-admin-primary btn-lg w-100" id="forgotBtn">Continue</button>
          </form>
          <p class="text-center text-muted small mt-4 mb-0">
            <a href="login.html">← Back to sign in</a>
          </p>
        </div>
      </div>
    </div>
    <script src="assets/js/admin-api.js?v=4"></script>
    <script src="assets/js/admin-password-reset.js?v=3"></script>
  </body>
</html>
