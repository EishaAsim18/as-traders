<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot password — A &amp; S Traders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/css/customer.css" rel="stylesheet" />
    <script src="assets/js/config.js?v=4"></script>
  </head>
  <body>
    <div class="store-topbar">
      <div class="store-topbar-inner justify-content-center">
        <a href="login.html">← Back to sign in</a>
      </div>
    </div>

    <div class="container py-5" style="max-width: 480px">
      <h1 class="h3 font-display fw-bold mb-2">Forgot password</h1>
      <p class="text-muted small mb-4">
        Enter your account email. We will send a reset link if an account exists.
      </p>

          <div id="forgotAlert" class="alert small d-none" role="alert"></div>
          <div id="forgotResetLink" class="d-none mb-3"></div>

      <form id="forgotForm" novalidate>
        <div class="mb-3">
          <label class="form-label small fw-semibold" for="forgotEmail">Email</label>
          <input type="email" class="form-control form-control-lg" id="forgotEmail" autocomplete="email" required />
        </div>
        <button type="submit" class="btn btn-accent btn-lg w-100" id="forgotBtn">Send reset link</button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Remember your password? <a href="login.html">Sign in</a>
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/customer-common.js?v=23"></script>
    <script src="assets/js/password-reset-page.js?v=3"></script>
  </body>
</html>
