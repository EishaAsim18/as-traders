<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password — A &amp; S Traders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/css/customer.css" rel="stylesheet" />
    <script src="assets/js/config.js?v=4"></script>
  </head>
  <body>
    <div class="store-topbar">
      <div class="store-topbar-inner justify-content-center">
        <a href="login.html">← Back to sign in</a>
      </div>
    </div>

    <div class="container py-5" style="max-width: 480px">
      <h1 class="h3 font-display fw-bold mb-2">Choose a new password</h1>
      <p class="text-muted small mb-4">Use at least 8 characters including one special character (!@#$…).</p>

      <div id="resetAlert" class="alert small d-none" role="alert"></div>

      <form id="resetForm" novalidate>
        <input type="hidden" id="resetToken" />
        <div class="mb-3">
          <label class="form-label small fw-semibold" for="resetPassword">New password</label>
          <input type="password" class="form-control form-control-lg js-password-toggle" id="resetPassword" autocomplete="new-password" minlength="8" maxlength="72" required />
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold" for="resetPassword2">Confirm password</label>
          <input type="password" class="form-control form-control-lg js-password-toggle" id="resetPassword2" autocomplete="new-password" minlength="8" maxlength="72" required />
        </div>
        <button type="submit" class="btn btn-accent btn-lg w-100" id="resetBtn">Update password</button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Link expired? <a href="forgot-password.html">Request a new one</a>
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/customer-common.js?v=23"></script>
    <script src="assets/js/password-toggle.js?v=1"></script>
    <script src="assets/js/password-reset-page.js?v=1"></script>
  </body>
</html>
